name: "buildkit-operator build"
description: "Build a container image via buildkit-operator: route to the project's hot buildkitd and build with buildx remote over mTLS (warm cache, optional S3 cold cache, monorepo-aware)."
author: "SocialGouv"
branding:
  icon: package
  color: blue

inputs:
  buildd-url:
    description: "buildd /route API URL (LoadBalancer/Ingress)."
    required: true
  ca:
    description: "Client mTLS CA (PEM)."
    required: true
  cert:
    description: "Client mTLS certificate (PEM)."
    required: true
  key:
    description: "Client mTLS private key (PEM)."
    required: true
  token:
    description: "Bearer token for the buildd /route API (required if buildd is exposed off-cluster with auth)."
    default: ""
  tags:
    description: "Image tag(s), whitespace-separated (e.g. ghcr.io/org/app:sha)."
    required: true
  repo:
    description: "Project identity = the cache key. Defaults to the GitHub repository."
    default: ${{ github.repository }}
  name:
    description: "Optional monorepo component — gives each image its own daemon + cache."
    default: ""
  arch:
    description: "Build architecture: amd64 | arm64."
    default: amd64
  context:
    description: "Build context path."
    default: "."
  file:
    description: "Dockerfile path (default: Dockerfile in the context)."
    default: ""
  target:
    description: "Dockerfile target stage."
    default: ""
  untrusted:
    description: "Untrusted (fork-PR) build: route to an ephemeral daemon, no write-back to the shared cache (anti cache-poisoning)."
    default: "false"
  push:
    description: "Push the result to the registry."
    default: "false"
  gateway-ip:
    description: "Optional: gateway LoadBalancer IP, to map the gateway hostname for this run when there is no wildcard DNS yet (testing/bootstrap)."
    default: ""
  provenance:
    description: "SLSA provenance attestation, e.g. 'mode=max' (needs push: true). Empty = off."
    default: ""
  sbom:
    description: "Generate an SBOM attestation (needs push: true)."
    default: "false"
  sign:
    description: "cosign keyless-sign the pushed image. Requires push: true and the caller job to set permissions.id-token: write."
    default: "false"

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v3
    - shell: bash
      env:
        BUILDKIT_OPERATOR_BUILDD_URL: ${{ inputs.buildd-url }}
        BUILDKIT_OPERATOR_CA: ${{ inputs.ca }}
        BUILDKIT_OPERATOR_CERT: ${{ inputs.cert }}
        BUILDKIT_OPERATOR_KEY: ${{ inputs.key }}
        BUILDKIT_OPERATOR_TOKEN: ${{ inputs.token }}
        REPO: ${{ inputs.repo }}
        NAME: ${{ inputs.name }}
        ARCH: ${{ inputs.arch }}
        BUILD_CONTEXT: ${{ inputs.context }}
        DOCKERFILE: ${{ inputs.file }}
        TARGET: ${{ inputs.target }}
        UNTRUSTED: ${{ inputs.untrusted }}
        TAGS: ${{ inputs.tags }}
        PUSH: ${{ inputs.push }}
        GATEWAY_IP: ${{ inputs.gateway-ip }}
        PROVENANCE: ${{ inputs.provenance }}
        SBOM: ${{ inputs.sbom }}
      run: ${{ github.action_path }}/scripts/build.sh
    - if: ${{ inputs.sign == 'true' }}
      uses: sigstore/cosign-installer@v3
    - if: ${{ inputs.sign == 'true' }}
      shell: bash
      env:
        TAGS: ${{ inputs.tags }}
      run: |
        for t in $TAGS; do echo "cosign sign $t"; cosign sign --yes "$t"; done
