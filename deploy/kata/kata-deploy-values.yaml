# kata-deploy scoped to the BUILD NODEPOOL: every node in it — including replacement nodes MKS recycles
# in — gets Kata automatically (durable; survives a downscale). Tolerates the pool taint. NFD disabled
# (the whole pool is virt-capable, so no per-node feature detection is needed).
node-feature-discovery:
  enabled: false
nodeSelector:
  nodepool: prod-build # the build nodepool; change to match your pool's label
tolerations:
  - key: pool
    operator: Equal
    value: ci
    effect: NoSchedule
