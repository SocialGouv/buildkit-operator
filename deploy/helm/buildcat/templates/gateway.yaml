{{- if .Values.gateway.host }}
# Shared SNI gateway: ONE LoadBalancer fronts every daemon (vs one public LB per daemon). It peeks
# the ClientHello SNI <daemon>.<host> and pipes to the daemon's ClusterIP — mTLS stays end-to-end.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "buildcat.fullname" . }}-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "buildcat.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "buildcat.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "buildcat.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --listen=:{{ .Values.buildkit.port }}
            - --domain={{ .Values.gateway.host }}
            - --namespace={{ .Values.namespace }}
            - --daemon-port={{ .Values.buildkit.port }}
          ports:
            - name: sni
              containerPort: {{ .Values.buildkit.port }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "buildcat.fullname" . }}-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "buildcat.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "buildcat.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: gateway
  ports:
    - name: sni
      port: {{ .Values.buildkit.port }}
      targetPort: {{ .Values.buildkit.port }}
      protocol: TCP
{{- end }}
