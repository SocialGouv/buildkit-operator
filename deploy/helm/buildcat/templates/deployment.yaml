apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "buildcat.fullname" . }}-buildd
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "buildcat.labels" . | nindent 4 }}
    app.kubernetes.io/component: buildd
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "buildcat.buildd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "buildcat.buildd.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "buildcat.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: buildd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # buildd is configured by FLAGS (it does not read env vars). It needs no volumes:
          # it only hands the ConfigMap/Secret *names* to the builder, which mounts them into
          # the per-project daemon pods it reconciles.
          args:
            - --namespace={{ .Values.namespace }}
            - --buildkit-image={{ .Values.buildkit.image }}
            - --companion={{ .Values.companion.enabled }}
            - --companion-image={{ .Values.companion.image.repository }}:{{ .Values.companion.image.tag }}
            - --daemon-certs-secret={{ .Values.certs.daemonSecretName }}
            - --buildkitd-configmap={{ include "buildcat.fullname" . }}-buildkitd-config
            - --snapshot-class={{ .Values.snapshotClassName }}
            - --keep-snapshots={{ .Values.snapshots.keep }}
            - --max-cold-starts={{ .Values.maxColdStarts }}
            - --port={{ .Values.buildkit.port }}
            - --api-listen=:{{ .Values.service.port }}
            - --metrics-addr=:{{ .Values.metrics.port }}
            - --buildd-url=http://{{ include "buildcat.fullname" . }}-buildd.{{ .Values.namespace }}.svc:{{ .Values.service.port }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
