---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: builds.buildcat.dev
spec:
  group: buildcat.dev
  names:
    kind: Build
    listKind: BuildList
    plural: builds
    singular: build
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.projectKey
      name: Project
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Build is one build run routed to a BuildProject's daemon.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BuildSpec is a single build run. Optional in M1 (the CLI can route + build
              without recording a Build), but it gives audit / async / observability from M2.
            properties:
              dockerfile:
                description: Dockerfile path within the context.
                type: string
              output:
                description: Output destination (e.g. push=registry/image:tag, or
                  local).
                type: string
              platforms:
                description: Platforms to build for (e.g. linux/amd64).
                items:
                  type: string
                type: array
              projectKey:
                description: ProjectKey is the BuildProject.Spec.Key this run routes
                  to.
                minLength: 1
                type: string
              source:
                description: Source is the build context reference (git URL, tarball
                  URL, etc.).
                type: string
              target:
                description: Target Dockerfile stage.
                type: string
              untrusted:
                description: |-
                  Untrusted marks fork-PR builds: routed to an ephemeral daemon seeded from a
                  read-only clone, with no write-back to the canonical cache (anti cache-poisoning, M4).
                type: boolean
            required:
            - projectKey
            type: object
          status:
            description: BuildStatus reflects the observed build state.
            properties:
              cacheStats:
                description: CacheStats summarizes layer + cache-mount hit/miss for
                  this run.
                type: string
              endpoint:
                description: Endpoint the build was routed to.
                type: string
              finishedAt:
                format: date-time
                type: string
              imageDigest:
                description: ImageDigest of the produced image (when pushed).
                type: string
              phase:
                description: 'Phase: Pending | Routing | Building | Succeeded | Failed.'
                type: string
              startedAt:
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
