apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "buildkit-operator.serviceAccountName" . }}
  namespace: {{ include "buildkit-operator.operatorNamespace" . }}
  labels:
    {{- include "buildkit-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: buildd
# buildd IS a controller-runtime manager: it needs the SA token to watch/reconcile BuildProjects and
# manage StatefulSets/Services/PVCs. Set explicitly so a cluster default of false doesn't break it.
automountServiceAccountToken: true
