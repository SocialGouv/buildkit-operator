apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "buildkit-operator.fullname" . }}-buildkitd-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "buildkit-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: buildd
data:
  # GC config for the per-project buildkitd daemons. The buildd controller mounts
  # this ConfigMap into every StatefulSet it creates. Canonical source:
  # deploy/config/buildkitd.toml (mirrored into the chart at files/buildkitd.toml).
  buildkitd.toml: |-
    {{- .Files.Get "files/buildkitd.toml" | nindent 4 }}
    {{- if .Values.mirror.host }}

    # Pull-through cache: base-image (FROM) pulls resolve via an in-cluster mirror — LAN-speed,
    # immune to Docker Hub rate limits, resilient to upstream outages.
    [registry."docker.io"]
      mirrors = ["{{ .Values.mirror.host }}"]
    [registry."{{ .Values.mirror.host }}"]
      http = true
    {{- end }}
