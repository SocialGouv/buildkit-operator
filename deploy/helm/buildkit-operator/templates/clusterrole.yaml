apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "buildkit-operator.fullname" . }}-buildd
  namespace: {{ include "buildkit-operator.buildsNamespace" . }}
  labels:
    {{- include "buildkit-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: buildd
rules:
  # --- buildkit-operator custom resources -------------------------------------------
  # Full lifecycle over the BuildProjects the controller reconciles (incl. creating fork/clone
  # children and reaping idle forks).
  - apiGroups: ["buildkit-operator.socialgouv.github.io"]
    resources: ["buildprojects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Status subresource (write-back of observed state / conditions / inflight count).
  - apiGroups: ["buildkit-operator.socialgouv.github.io"]
    resources: ["buildprojects/status"]
    verbs: ["get", "update", "patch"]

  # --- apps: the per-project StatefulSet-of-1 the controller creates --------
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # --- core: per-project Service / Pods / PVC, plus mounted config ----------
  # Services (one per project, TCP+mTLS :1234) and PVCs (the warm cache) are
  # created/owned by the controller.
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pods: read-only (status/readiness of the daemons; the StatefulSet owns them).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Daemon cert Secret: buildd reads this Secret only to warn early when gateway.host is configured
  # but the daemon certificate lacks a matching wildcard SAN. Daemon pods mount certs/config via the
  # kubelet; buildd does not need list/watch over Secrets or ConfigMaps.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.certs.daemonSecretName | quote }}]
    verbs: ["get"]
  # Events: emit reconcile events on the CRs/daemons.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # --- snapshot.storage.k8s.io: cache durability / seed (M3) ----------------
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "buildkit-operator.fullname" . }}-leader-election
  namespace: {{ include "buildkit-operator.operatorNamespace" . }}
  labels:
    {{- include "buildkit-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: buildd
rules:
  # --- leader election (HA): the controller-runtime manager holds a Lease ----
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
