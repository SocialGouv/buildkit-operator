apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "buildkit-operator.fullname" . }}-buildd
  namespace: {{ include "buildkit-operator.operatorNamespace" . }}
  labels:
    {{- include "buildkit-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: buildd
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "buildkit-operator.buildd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "buildkit-operator.buildd.selectorLabels" . | nindent 8 }}
      {{- if .Values.oidc.providers }}
      annotations:
        # Roll buildd when the OIDC policy changes (the mounted ConfigMap isn't watched by buildd).
        checksum/oidc-config: {{ include (print $.Template.BasePath "/oidc-configmap.yaml") . | sha256sum }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "buildkit-operator.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: buildd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # buildd is configured by FLAGS (it does not read env vars). It needs no volumes:
          # it only hands the ConfigMap/Secret *names* to the builder, which mounts them into
          # the per-project daemon pods it reconciles.
          args:
            - --namespace={{ include "buildkit-operator.buildsNamespace" . }}
            - --buildkit-image={{ .Values.buildkit.image }}
            - --companion={{ .Values.companion.enabled }}
            - --companion-image={{ .Values.companion.image.repository }}:{{ .Values.companion.image.tag | default .Chart.AppVersion }}
            - --daemon-certs-secret={{ .Values.certs.daemonSecretName }}
            {{- if .Values.certManager.enabled }}
            - --cert-manager-certs=true
            {{- end }}
            - --buildkitd-configmap={{ include "buildkit-operator.fullname" . }}-buildkitd-config
            - --snapshot-class={{ .Values.snapshotClassName }}
            - --keep-snapshots={{ .Values.snapshots.keep }}
            - --max-cold-starts={{ .Values.maxColdStarts }}
            - --leader-elect={{ .Values.leaderElection }}
            {{- if .Values.gateway.host }}
            - --gateway-host={{ .Values.gateway.host }}
            {{- if .Values.gateway.externalPort }}
            - --gateway-port={{ .Values.gateway.externalPort }} # /route advertises this external port
            {{- end }}
            {{- end }}
            {{- if .Values.sandbox.runtimeClass }}
            - --sandbox-runtime-class={{ .Values.sandbox.runtimeClass }}
            {{- if .Values.sandbox.buildkitImage }}
            - --sandbox-buildkit-image={{ .Values.sandbox.buildkitImage }}
            {{- end }}
            {{- end }}
            {{- if or .Values.daemonScheduling.nodeSelector .Values.daemonScheduling.tolerations .Values.daemonScheduling.affinity }}
            - {{ printf "--daemon-scheduling=%s" (.Values.daemonScheduling | toJson) | quote }}
            {{- end }}
            - --port={{ .Values.buildkit.port }}
            - --api-listen=:{{ .Values.service.port }}
            - --metrics-addr=:{{ .Values.metrics.port }}
            {{- with .Values.api }}
            {{- if hasKey . "rateLimit" }}
            - --api-rate-limit={{ .rateLimit }}
            {{- end }}
            {{- if hasKey . "rateBurst" }}
            - --api-rate-burst={{ .rateBurst }}
            {{- end }}
            {{- end }}
            {{- if .Values.s3.bucket }}
            - --s3-bucket={{ .Values.s3.bucket }}
            - --s3-region={{ .Values.s3.region }}
            - --s3-endpoint={{ .Values.s3.endpoint }}
            - --s3-creds-secret={{ .Values.s3.credsSecret }}
            {{- end }}
            {{- if .Values.oidc.providers }}
            # Secure-by-default identity verification: bind /route to the forge-signed repo claim.
            - --oidc-config=/etc/buildkit-operator/oidc/oidc.yaml
            {{- end }}
          {{- if .Values.oidc.providers }}
          volumeMounts:
            - name: oidc-config
              mountPath: /etc/buildkit-operator/oidc
              readOnly: true
          {{- end }}
          env:
            # buildd creates daemons in --namespace (the builds ns) but its leader-election Lease must
            # live in the namespace buildd RUNS in (the operator ns) — handed in via the downward API.
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.auth.tokenSecret }}
            # LEGACY bearer-token auth for /route, used only when OIDC is off (read from a Secret, not a
            # flag, so it isn't in the pod spec).
            - name: BUILDKIT_OPERATOR_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.tokenSecret }}
                  key: token
            {{- end }}
            {{- if .Values.oidc.adminTokenSecret }}
            # Break-glass admin token (distinct header) — bypasses OIDC for the manual CLI / in-cluster ops.
            - name: BUILDKIT_OPERATOR_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oidc.adminTokenSecret }}
                  key: token
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      {{- if .Values.oidc.providers }}
      volumes:
        - name: oidc-config
          configMap:
            name: {{ include "buildkit-operator.fullname" . }}-oidc
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
