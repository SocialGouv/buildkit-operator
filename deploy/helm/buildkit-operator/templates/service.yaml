{{- if eq .Values.service.type "LoadBalancer" }}
  {{- if not .Values.service.loadBalancerSourceRanges }}
    {{- fail "service.type=LoadBalancer exposes the buildd /route API over PLAIN HTTP off-cluster (this L4 LB does NOT terminate TLS): a bearer token would travel in cleartext and anyone reachable could spin up build daemons. Set service.loadBalancerSourceRanges to an IP allowlist. For PUBLIC off-cluster access prefer the TLS Ingress (ingress.enabled) over a raw LoadBalancer." }}
  {{- end }}
  {{- if not .Values.auth.tokenSecret }}
    {{- fail "service.type=LoadBalancer without auth.tokenSecret: the /route API is unauthenticated and anyone reaching the LB can spin up build daemons. Set auth.tokenSecret (and prefer ingress.enabled for TLS termination)." }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "buildkit-operator.fullname" . }}-buildd
  namespace: {{ include "buildkit-operator.operatorNamespace" . }}
  labels:
    {{- include "buildkit-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: buildd
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- with .Values.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    {{- include "buildkit-operator.buildd.selectorLabels" . | nindent 4 }}
  ports:
    # buildd HTTP /route API + /healthz.
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
