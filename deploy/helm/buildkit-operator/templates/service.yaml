{{- if eq .Values.service.type "LoadBalancer" }}
  {{- if and (not .Values.auth.tokenSecret) (not .Values.service.loadBalancerSourceRanges) }}
    {{- fail "service.type=LoadBalancer exposes the buildd /route API off-cluster: set auth.tokenSecret (bearer token) or service.loadBalancerSourceRanges (allowlisted IPs) — otherwise anyone can spin up build daemons." }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "buildkit-operator.fullname" . }}-buildd
  namespace: {{ include "buildkit-operator.operatorNamespace" . }}
  labels:
    {{- include "buildkit-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: buildd
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- with .Values.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    {{- include "buildkit-operator.buildd.selectorLabels" . | nindent 4 }}
  ports:
    # buildd HTTP /route API + /healthz.
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
