{{- if .Values.gateway.host }}
# Shared SNI gateway: ONE LoadBalancer fronts every daemon (vs one public LB per daemon). It peeks
# the ClientHello SNI <daemon>.<host> and pipes to the daemon's ClusterIP — mTLS stays end-to-end.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "buildkit-operator.fullname" . }}-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "buildkit-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "buildkit-operator.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "buildkit-operator.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: gateway
    spec:
      # Give in-flight builds time to drain on rollout/scale-down (the gateway stops accepting on
      # SIGTERM and waits ~115s for open connections).
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --listen=:{{ .Values.buildkit.port }}
            - --health-listen=:8081
            - --domain={{ .Values.gateway.host }}
            - --namespace={{ .Values.namespace }}
            - --daemon-port={{ .Values.buildkit.port }}
          ports:
            - name: sni
              containerPort: {{ .Values.buildkit.port }}
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          readinessProbe:
            httpGet: { path: /readyz, port: health }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: health }
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "buildkit-operator.fullname" . }}-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "buildkit-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  {{- with .Values.gateway.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "buildkit-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: gateway
  ports:
    - name: sni
      port: {{ .Values.buildkit.port }}
      targetPort: {{ .Values.buildkit.port }}
      protocol: TCP
{{- end }}
