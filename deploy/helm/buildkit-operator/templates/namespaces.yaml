{{- if .Values.createNamespaces }}
{{- /*
Create the BUILDS namespace (labelled — which doubles as a stable target for the platform's Kyverno
securityContext exemption). The OPERATOR namespace is the Helm release namespace (created by
`helm install --namespace <operator> --create-namespace`), so it is NOT rendered here — adopting an
existing release namespace as a chart object triggers a Helm ownership conflict. Set
createNamespaces=false when the builds namespace is provisioned out-of-band (GitOps / platform). The
Kata node plumbing namespace (buildkit-system) is installed separately with kata-deploy (deploy/kata/).
*/}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "buildkit-operator.buildsNamespace" . }}
  labels:
    {{- include "buildkit-operator.labels" . | nindent 4 }}
    app.kubernetes.io/part-of: buildkit-operator
    buildkit-operator.socialgouv.github.io/role: builds # runs untrusted build code; needs the securityContext Kyverno exemption
{{- end }}
