apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "buildkit-operator.fullname" . }}-buildd
  labels:
    {{- include "buildkit-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: buildd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "buildkit-operator.fullname" . }}-buildd
subjects:
  - kind: ServiceAccount
    name: {{ include "buildkit-operator.serviceAccountName" . }}
    namespace: {{ include "buildkit-operator.operatorNamespace" . }}
