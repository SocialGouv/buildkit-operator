# Default values for the buildkit-operator chart.
# This installs the CLUSTER-WIDE control plane only. The per-project buildkitd
# StatefulSets, their Services and cache PVCs are reconciled by the buildd
# controller at runtime from BuildProject custom resources — they are never
# templated here.

# Namespace the control plane runs in. Used for resource metadata and as the
# value of the BUILDKIT_OPERATOR_NAMESPACE env handed to buildd (the namespace it watches
# and creates per-project daemons in). Create it with --create-namespace, or
# point at an existing one.
namespace: buildkit-operator

# buildd runs HA: >1 replica with leader election (only the leader reconciles; the /route API
# is served by every replica behind the Service).
replicaCount: 2
leaderElection: true

# --- buildd: the controller-runtime manager + HTTP /route API on :8080 -------
image:
  repository: ghcr.io/socialgouv/buildkit-operator-buildd
  tag: dev
  pullPolicy: IfNotPresent

# --- companion: the inode-GC backstop sidecar -------------------------------
# buildd injects this image as a sidecar into every per-project buildkitd pod it
# creates. It is surfaced here so the controller can read it from its env and so
# the whole fleet is pinned to one digest/tag.
companion:
  # Inject the companion sidecar into per-project daemons. Requires the companion image to
  # be built+pushed (it bundles buildctl). Set false to run daemon-only (no inode backstop).
  enabled: true
  image:
    repository: ghcr.io/socialgouv/buildkit-operator-companion
    tag: dev
    pullPolicy: IfNotPresent

# --- buildkitd: the per-project daemon image --------------------------------
# Pinned to a release (NOT master) for reproducible builds across the fleet.
# Rootless variant by default to minimise breakout surface.
buildkit:
  image: moby/buildkit:v0.22.0-rootless
  # gRPC port each per-project Service exposes (TCP + mTLS).
  port: 1234

# --- Per-project daemon defaults --------------------------------------------
# NOTE: the per-project defaults (storageClass, cacheVolumeGi, tier, idleTimeoutSec, securityProfile)
# are NOT set here — buildd has no flags for them. They are enforced by the CRD's +kubebuilder:default
# markers (and mirrored by applyDefaults in the controller). To change a default, edit the CRD/BuildProject,
# or set the field per-project on the BuildProject CR. Putting them here would be silently ignored.

# Snapshot class used by the controller for VolumeSnapshot-based cache seed/durability (M3).
# OVH ships csi-cinder-snapclass-v1 (at-rest) and csi-cinder-snapclass-in-use-v1 (in-use); the
# in-use variant lets buildd snapshot a hot daemon without scale-to-zero (bench D-bis).
snapshotClassName: csi-cinder-snapclass-in-use-v1

# Durability snapshots retained per project (M3, oldest pruned).
snapshots:
  keep: 3

# S3 cold cache as a PROJECT policy. When `bucket` is set, buildd returns the per-project cache
# reference on /route and clients apply it automatically — no S3 config or credentials on the CI
# side. The daemons read the AWS creds from `credsSecret` (env AWS_ACCESS_KEY_ID/SECRET). Point this
# at OVH Object Storage in production; an empty bucket disables the cold cache.
s3:
  bucket: ""
  region: us-east-1
  endpoint: "" # e.g. https://s3.gra.io.cloud.ovh.net (empty = AWS default)
  credsSecret: "" # k8s Secret with AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY

# Network egress lockdown for the build daemons: they keep DNS + registry/package internet + external
# S3, but cannot reach other in-cluster pods (lateral-movement + inter-daemon isolation). For an
# IN-CLUSTER S3/MinIO or a pull-through cache mirror, allowlist it under extraEgress, e.g.:
#   extraEgress:
#     - to: [{ podSelector: { matchLabels: { app: minio } } }]
#       ports: [{ protocol: TCP, port: 9000 }]
networkPolicy:
  enabled: true
  extraEgress: []
  # Opt-in: give UNTRUSTED fork daemons a stricter, internet-less egress (DNS + extraEgress only), so
  # base images come ONLY through the in-cluster pull-through mirror and untrusted builds cannot
  # exfiltrate. Trusted (canonical) daemons keep full internet. Only meaningful with the mirror (and
  # S3, if used) listed under extraEgress — otherwise forks can't pull anything.
  forkEgressStrict: false

# Pull-through cache for base-image (FROM) pulls: LAN-speed, immune to Docker Hub rate limits,
# resilient to upstream outages. `enabled` bundles a registry:2 proxy; `host` is the mirror the
# daemons use in buildkitd.toml (point it at the bundled Service, or an external mirror). One upstream
# per registry. NB: with networkPolicy on, allowlist `host` under networkPolicy.extraEgress.
mirror:
  enabled: false
  host: "" # e.g. buildkit-operator-mirror:5000
  upstream: https://registry-1.docker.io
  image: registry:2
  storage: 20Gi
  storageClass: "" # empty = csi-cinder-high-speed-gen2
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: "1", memory: 512Mi }

# Sandboxed runtime for UNTRUSTED fork daemons only (trusted daemons keep the default runtime for
# speed). The build runs attacker-controlled code, so isolate forks harder than runc. Point at an
# installed RuntimeClass: `sysbox-runc` keeps no_new_privs ON (lets you drop the Kyverno exemption);
# `gvisor`/`kata` are alternatives. Requires the runtime installed on the nodes + the RuntimeClass.
sandbox:
  runtimeClass: ""

# Scheduling for the per-project daemon pods (NOT the buildd control plane — that uses nodeSelector/
# tolerations/affinity below). The recommended PRODUCTION topology pins daemons to a DEDICATED build
# nodepool so build spikes and untrusted RUN code stay off the app / control-plane nodes (and you can
# install a sandboxed runtime there). Taint the pool (e.g. workload=buildkit:NoSchedule), then set a
# matching toleration + a nodeSelector here. All empty = daemons schedule anywhere (dev / shared).
#   daemonScheduling:
#     nodeSelector: { nodepool: buildkit }
#     tolerations:
#       - { key: workload, operator: Equal, value: buildkit, effect: NoSchedule }
daemonScheduling:
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Max concurrent cold-start attaches buildd allows (M4 backpressure; seed from bench C so a
# CI burst does not serialize Cinder attaches into minutes).
maxColdStarts: 8

# Prometheus metrics endpoint (M4). Scrape buildkit_operator_* + controller-runtime metrics here.
metrics:
  port: 8081

serviceAccount:
  # Name of the ServiceAccount buildd runs as. If empty, the chart fullname is
  # used. The ClusterRoleBinding binds the buildd ClusterRole to this SA.
  name: buildkit-operator-buildd

# Resources for the buildd controller pod (NOT the per-project daemons — those
# are sized per BuildProject.spec.resources).
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Shared SNI gateway for off-cluster CI. When `host` is set, daemons stay ClusterIP and ONE
# LoadBalancer (the gateway) fronts all of them: buildd returns tcp://<daemon>.<host>:1234 and the
# gateway routes by SNI to the daemon's ClusterIP — mTLS stays end-to-end. Point a wildcard DNS
# *.<host> at the gateway LB; the daemon cert SAN must cover *.<host>. Empty host = in-cluster only.
gateway:
  host: "" # e.g. builds.buildkit-operator.example.com
  image:
    repository: ghcr.io/socialgouv/buildkit-operator-gateway
    tag: dev
  service:
    type: LoadBalancer
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 500m, memory: 128Mi }

# buildd Service (exposes the /route API and /healthz on :8080). Set type: LoadBalancer to reach
# the /route API from off-cluster runners.
service:
  port: 8080
  type: ClusterIP

# Names of the mTLS Secrets minted by deploy/cert/create-certs.sh. The daemon Secret is mounted by
# per-project daemons (the controller wires its NAME into each StatefulSet). buildd itself does NOT
# dial daemons (it only reads StatefulSet status via the API), so it mounts no client cert; the client
# Secret is distributed to CI runners (the `build` CLI / Action), not to buildd.
certs:
  daemonSecretName: buildkit-daemon-certs
  clientSecretName: buildkit-client-certs

# Optional bearer-token auth for the buildd /route API. REQUIRED if you expose the buildd Service
# off-cluster (service.type: LoadBalancer) — otherwise anyone reaching /route can spin up daemons.
# Create a Secret with key `token`, set its name here; buildd reads it as $BUILDKIT_OPERATOR_AUTH_TOKEN
# and CI passes the same value (build --token / BUILDKIT_OPERATOR_TOKEN). Empty = no auth (in-cluster only).
auth:
  tokenSecret: "" # k8s Secret name holding key `token`

# Optional node scheduling controls for the buildd pod.
nodeSelector: {}
tolerations: []
affinity: {}
