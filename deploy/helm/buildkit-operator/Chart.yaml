apiVersion: v2
name: buildkit-operator
description: >-
  Control plane for one hot, vanilla buildkitd per (project, arch) on Kubernetes.
  Installs the buildd controller, its RBAC, the shared buildkitd GC config, and
  references the generated CRDs. Per-project StatefulSets/Services/PVCs are
  created by the buildd controller at runtime — they are NOT part of this chart.
type: application
version: 0.5.2
appVersion: "0.5.2"
keywords:
  - buildkit
  - ci
  - build-cache
home: https://github.com/socialgouv/buildkit-operator
sources:
  - https://github.com/socialgouv/buildkit-operator
maintainers:
  - name: SocialGouv
    url: https://github.com/socialgouv
