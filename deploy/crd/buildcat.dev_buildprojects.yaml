---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: buildprojects.buildcat.dev
spec:
  group: buildcat.dev
  names:
    kind: BuildProject
    listKind: BuildProjectList
    plural: buildprojects
    shortNames:
    - bp
    - buildproj
    singular: buildproject
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.arch
      name: Arch
      type: string
    - jsonPath: .spec.tier
      name: Tier
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.replicas
      name: Replicas
      type: integer
    - jsonPath: .status.endpoint
      name: Endpoint
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BuildProject is the cache identity + lifecycle of one hot buildkitd.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BuildProjectSpec is the cache identity and daemon lifecycle of one
              (project, arch). All builds that must share a cache MUST resolve to the same
              Key — see internal/router for the normalization that guarantees this.
            properties:
              arch:
                description: Arch is the build architecture.
                enum:
                - amd64
                - arm64
                type: string
              cacheVolumeGi:
                default: 60
                description: |-
                  CacheVolumeGi sizes the cache volume. On gen2, throughput scales with size
                  (~30 IOPS/Gi + 0.5 MB/s/Gi), so size for bandwidth, not just capacity.
                format: int32
                minimum: 1
                type: integer
              fanout:
                description: |-
                  Fanout is the number of additional warm clone daemons for a saturated project (M5,
                  conditional — vertical first). Each clone is a sibling BuildProject seeded (CoW) from the
                  latest snapshot; layers converge via shared S3. 0 = no fan-out.
                format: int32
                minimum: 0
                type: integer
              idleTimeoutSec:
                default: 900
                description: |-
                  IdleTimeoutSec is the idle window before scale-to-zero (ignored on hot).
                  Default seeded from bench B (reattach cycle ~31s p50 => generous timeout).
                format: int32
                minimum: 0
                type: integer
              key:
                description: |-
                  Key is the stable cache identity: a truncated sha256 of the normalized
                  (repo, target, arch). Set by the router at creation; immutable.
                minLength: 1
                type: string
              repo:
                description: |-
                  Repo is the normalized source repository (lowercased, scheme/.git stripped).
                  Informational; the Key is what routes.
                type: string
              resources:
                description: Resources for the buildkitd container (CPU/RAM of the
                  daemon).
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This is an alpha field and requires enabling the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              restoreFromSnapshot:
                description: |-
                  RestoreFromSnapshot, if set, seeds the cache PVC from this VolumeSnapshot on creation
                  (DR / new cluster / lost volume). Ignored once the PVC exists.
                type: string
              securityProfile:
                default: rootless
                description: SecurityProfile hardens the buildkitd pod.
                enum:
                - rootless
                - userns
                - privileged
                type: string
              snapshotEverySec:
                description: |-
                  SnapshotEverySec is the durability/seed snapshot cadence (0 = never). OVH supports
                  in-use snapshots, so this does not require scale-to-zero.
                format: int32
                minimum: 0
                type: integer
              storageClass:
                default: csi-cinder-high-speed-gen2
                description: StorageClass for the cache PVC. On OVH MKS this is the
                  gen2 high-speed class.
                type: string
              target:
                description: Target is the Dockerfile target stage this daemon serves
                  ("" => default).
                type: string
              tier:
                default: warm
                description: Tier controls scale-to-zero. hot is never scaled to zero.
                enum:
                - hot
                - warm
                - cold
                type: string
            required:
            - arch
            - key
            type: object
          status:
            description: BuildProjectStatus reflects the observed daemon state.
            properties:
              conditions:
                description: Conditions follow the standard k8s condition convention
                  (Ready, Degraded).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              endpoint:
                description: Endpoint is the mTLS address clients dial (tcp://svc.ns.svc:1234).
                type: string
              inflightBuilds:
                description: InflightBuilds is the number of builds currently routed
                  to this daemon.
                format: int32
                type: integer
              lastBuildTime:
                description: LastBuildTime is when a build last touched this daemon
                  (drives idle).
                format: date-time
                type: string
              lastSnapshot:
                description: LastSnapshot is the name of the most recent VolumeSnapshot
                  (M3).
                type: string
              phase:
                description: 'Phase is a coarse summary: Pending | Warm | Idle | Scaling
                  | Failed.'
                type: string
              replicas:
                description: Replicas is the current desired/observed replica count
                  (0 or 1).
                format: int32
                type: integer
            required:
            - inflightBuilds
            - replicas
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
