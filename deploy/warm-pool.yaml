# Warm node-pool headroom for buildcat (M2).
#
# Why: a scale-to-one wakeup must NOT trigger cluster autoscaling — that costs minutes,
# and the Phase 0 bench (C) already showed Cinder attaches serialize into minutes under a
# burst of cold starts. A low-priority "balloon" Deployment of pause pods reserves builder-
# sized slots on the warm pool; real builder pods (default priority 0 > -10) preempt the
# balloons instantly on wakeup, so capacity is always ready. Size `replicas` to the peak
# concurrent cold starts you want to absorb without provisioning a node (tune per traffic).
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: buildcat-balloon
value: -10
globalDefault: false
preemptionPolicy: Never
description: "Preemptible filler reserving warm capacity for buildcat builders."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildcat-warm-pool
  namespace: buildcat
  labels:
    app.kubernetes.io/name: buildcat
    app.kubernetes.io/component: warm-pool
spec:
  replicas: 10 # ~peak concurrent cold starts to absorb (from bench C; tune per traffic)
  selector:
    matchLabels:
      app.kubernetes.io/name: buildcat
      app.kubernetes.io/component: warm-pool
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buildcat
        app.kubernetes.io/component: warm-pool
    spec:
      priorityClassName: buildcat-balloon
      terminationGracePeriodSeconds: 0
      # Pin to your builder/warm node pool so the headroom is where builders land:
      # nodeSelector: { nodepool: buildcat }
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            # Reserve one builder-sized slot per balloon so a preempting builder fits.
            requests: { cpu: "1", memory: 2Gi }
            limits: { cpu: "1", memory: 2Gi }
