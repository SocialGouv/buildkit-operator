# Flux: install the upstream kata-deploy chart from its git repo (it is not published to a Helm repo),
# scoped to the build nodepool so every node — including MKS replacements — gets Kata automatically.
# Pair with deploy/kata/kata-clh-vcpu-tune.yaml (the ≥4-vCPU guest floor) which applies as a plain DaemonSet.
#
# WARNING: kata-deploy installs node binaries to /opt/kata AND reconfigures + RESTARTS containerd on
# every targeted node (to register the kata runtime handlers). Running pods survive a containerd
# restart (it does not kill containers), but the node's control-plane blips — schedule a maintenance
# window and keep this scoped to the dedicated build nodepool (never shared nodes). See deploy/kata/README.md.
#
# NOTE: it runs in the dedicated `buildkit-system` namespace (privileged + hostPath), which — unlike
# kube-system — is NOT in the platform's default host-access exemptions, so buildkit-system must be added
# to BOTH the `securityContextPolicy` and `disallow-host-path` Kyverno excludedNamespaces (the privileged
# installer is invalid once allowPrivilegeEscalation is mutated to false). See deploy/kata/README.md.
#
# The chart declares a node-feature-discovery dependency. We disable it (enabled: false), but Flux still
# resolves chart deps — ensure your cluster can reach the NFD Helm repo, or vendor the chart. Argo CD
# users: an Application pointing at path tools/packaging/kata-deploy/helm-chart/kata-deploy with the same
# values works equivalently.
---
apiVersion: v1
kind: Namespace
metadata:
  name: buildkit-system
  labels:
    app.kubernetes.io/part-of: buildkit-operator
    buildkit-operator.socialgouv.github.io/role: system # Kata node plumbing; needs the disallow-host-path exemption
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: kata-containers
  namespace: flux-system
spec:
  interval: 24h
  url: https://github.com/kata-containers/kata-containers
  ref:
    tag: "3.32.0"
  ignore: |
    /*
    !/tools/packaging/kata-deploy/helm-chart
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kata-deploy
  namespace: buildkit-system
spec:
  interval: 1h
  chart:
    spec:
      chart: tools/packaging/kata-deploy/helm-chart/kata-deploy
      sourceRef:
        kind: GitRepository
        name: kata-containers
        namespace: flux-system
  values:
    node-feature-discovery:
      enabled: false
    nodeSelector:
      nodepool: prod-build # the build nodepool — change to match your pool's label
    tolerations:
      - key: pool
        operator: Equal
        value: ci
        effect: NoSchedule
