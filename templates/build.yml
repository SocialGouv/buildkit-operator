# buildkit-operator — reusable GitLab CI/CD component to build a container image.
#
# It routes the build to the project's hot buildkitd (via buildd /route) and runs `docker buildx`
# against that daemon over mTLS — warm cache + optional S3 cold cache, monorepo-aware. The build runs
# on the REMOTE daemon, so the job needs only the docker CLI + buildx + curl + jq — NO privileged
# docker:dind service.
#
# Usage (GitLab catalog component):
#   include:
#     - component: $CI_SERVER_FQDN/<mirror-path>/build@0.6.0
#       inputs: { tags: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA", push: "true" }
#
# Usage (GitHub-hosted, remote include):
#   include:
#     - remote: "https://raw.githubusercontent.com/SocialGouv/buildkit-operator/v0.8.3/templates/build.yml"
#       inputs: { tags: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA", push: "true" }
#
# The mTLS material is read from MASKED CI/CD variables (set them at the group level):
#   BUILDKIT_OPERATOR_BUILDD_URL, BUILDKIT_OPERATOR_CA, BUILDKIT_OPERATOR_CERT, BUILDKIT_OPERATOR_KEY
#   (CA/CERT/KEY hold PEM; use "File" or masked variables).
# /route identity is a GitLab-signed OIDC id_token (minted automatically, see id_tokens below) — no
# shared bearer to distribute. Legacy/admin only: set BUILDKIT_OPERATOR_ADMIN_TOKEN as a masked variable.
# When the gateway has no wildcard DNS yet, also set BUILDKIT_OPERATOR_GATEWAY_IP (maps the SNI host).
#
# Egress-proxy-only runners (e.g. a CI platform behind an HTTP CONNECT proxy on 443): set
#   BUILDKIT_OPERATOR_HTTP_PROXY=host:port  + BUILDKIT_OPERATOR_TUNNEL=1
# Then BUILDKIT_OPERATOR_BUILDD_URL must be an https://…:443 host (a buildd Ingress) and the gateway
# must be fronted on 443 (chart: gateway.externalPort=443). curl(/route)+apk go through the proxy; the
# daemon TCP is socat-tunnelled through it (mTLS validated against the real daemon host via servername).
spec:
  inputs:
    job_name:
      default: buildkit-operator-build
      description: Name of the generated job.
    stage:
      default: build
      description: Pipeline stage the job runs in.
    image:
      default: docker:27
      description: Image with the docker CLI + buildx (curl/jq/git are installed at runtime). No dind needed.
    tags:
      description: Image tag(s), whitespace-separated (e.g. "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA").
    buildd_url:
      default: "$BUILDKIT_OPERATOR_BUILDD_URL"
      description: buildd /route API URL. Defaults to the CI/CD variable of the same name.
    repo:
      default: "$CI_PROJECT_URL"
      description: Project identity = the cache key. IGNORED when buildd enforces OIDC (the verified project_path is authoritative); used only on the legacy/admin path.
    name:
      default: ""
      description: Optional monorepo component — gives each image its own daemon + cache.
    arch:
      default: amd64
      description: "Build architecture: amd64 | arm64."
    context:
      default: "."
      description: Build context path.
    dockerfile:
      default: ""
      description: Dockerfile path (default = Dockerfile in the context).
    target:
      default: ""
      description: Dockerfile target stage.
    build_args:
      default: ""
      description: Build args, one KEY=VALUE per line (forwarded to buildx as --build-arg).
    labels:
      default: ""
      description: OCI image labels, one key=value per line (forwarded to buildx as --label).
    secrets:
      default: ""
      description: >-
        Build secrets, one id=value per line (forwarded to buildx as --secret id=…,env=…). Reference
        masked CI/CD variables in the value (e.g. "sentry_auth_token=$SENTRY_AUTH_TOKEN") — sent over
        the build session only, never stored in a layer, the cache, or the image config.
    untrusted:
      default: "false"
      description: Untrusted (fork/MR) build — route to an ephemeral daemon, no write-back to the shared cache.
    push:
      default: "false"
      description: Push the result to the registry.
    provenance:
      default: ""
      description: "SLSA provenance, e.g. 'mode=max' (needs push: true). Empty = off."
    sbom:
      default: "false"
      description: "Generate an SBOM attestation (needs push: true)."
    sign:
      default: "false"
      description: "cosign keyless-sign the pushed tags (needs push: true; uses GitLab OIDC id_tokens)."
    oidc_audience:
      default: buildkit-operator
      description: >-
        Audience of the GitLab OIDC id_token sent to buildd /route for identity verification (must match
        buildd's provider audience). buildd verifies the signature and binds the build to this project,
        so a leaked credential can't impersonate another project. The token is injected by GitLab — NO
        extra runner egress. For the legacy/admin path instead, set BUILDKIT_OPERATOR_ADMIN_TOKEN.
    ref:
      default: v0.8.3
      description: Exact buildkit-operator git tag/commit the build script is fetched from (keep in sync with the include).
    script_sha256:
      default: ""
      description: >-
        Expected sha256 of scripts/build.sh at `ref`. When set, the fetched script is verified and the
        job FAILS on mismatch — defends against a mutated tag / MITM on the raw.githubusercontent.com
        fetch. STRONGLY recommended: pin it to the hash published with the release matching `ref`.

---
# To gate the job, re-declare it in your pipeline with `rules:`/`needs:` — GitLab merges includes.
"$[[ inputs.job_name ]]":
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image ]]
  id_tokens:
    # Keyless cosign needs a Sigstore-audience OIDC token (only used when sign=true).
    SIGSTORE_ID_TOKEN:
      aud: sigstore
    # buildd /route identity: GitLab signs this; buildd verifies it and binds the build to this project.
    BUILDKIT_OPERATOR_ID_TOKEN:
      aud: "$[[ inputs.oidc_audience ]]"
  variables:
    BUILDKIT_OPERATOR_BUILDD_URL: "$[[ inputs.buildd_url ]]"
    # Secure default: send the signed OIDC identity token as the /route credential. For the legacy/admin
    # path, set BUILDKIT_OPERATOR_ADMIN_TOKEN as a CI/CD variable (it takes precedence in build.sh).
    BUILDKIT_OPERATOR_TOKEN: "$BUILDKIT_OPERATOR_ID_TOKEN"
    REPO: "$[[ inputs.repo ]]"
    NAME: "$[[ inputs.name ]]"
    ARCH: "$[[ inputs.arch ]]"
    BUILD_CONTEXT: "$[[ inputs.context ]]"
    DOCKERFILE: "$[[ inputs.dockerfile ]]"
    TARGET: "$[[ inputs.target ]]"
    BUILD_ARGS: "$[[ inputs.build_args ]]"
    LABELS: "$[[ inputs.labels ]]"
    SECRETS: "$[[ inputs.secrets ]]"
    UNTRUSTED: "$[[ inputs.untrusted ]]"
    TAGS: "$[[ inputs.tags ]]"
    PUSH: "$[[ inputs.push ]]"
    PROVENANCE: "$[[ inputs.provenance ]]"
    SBOM: "$[[ inputs.sbom ]]"
    BKO_REF: "$[[ inputs.ref ]]"
    BKO_SIGN: "$[[ inputs.sign ]]"
    BKO_SCRIPT_SHA256: "$[[ inputs.script_sha256 ]]"
  before_script:
    # docker:27 is alpine; install the script's deps (curl + jq + git; socat for the proxy tunnel;
    # buildx ships with the image). When the runner is egress-proxy-only (BUILDKIT_OPERATOR_HTTP_PROXY
    # set), route apk + curl through it — and the build script tunnels the daemon connection via socat.
    - |
      if [ -n "${BUILDKIT_OPERATOR_HTTP_PROXY:-}" ]; then
        export http_proxy="http://${BUILDKIT_OPERATOR_HTTP_PROXY}" https_proxy="http://${BUILDKIT_OPERATOR_HTTP_PROXY}"
        export HTTP_PROXY="$http_proxy" HTTPS_PROXY="$https_proxy"
        export no_proxy="127.0.0.1,localhost,${no_proxy:-}" NO_PROXY="127.0.0.1,localhost"
      fi
      command -v curl >/dev/null && command -v jq >/dev/null && command -v git >/dev/null && command -v socat >/dev/null || apk add --no-cache curl jq git socat
  script:
    # The gateway-IP escape hatch (no wildcard DNS yet) is read by the script from GATEWAY_IP.
    - export GATEWAY_IP="${BUILDKIT_OPERATOR_GATEWAY_IP:-}"
    # Re-export the proxy for the build step (curl /route + socat tunnel; the script reads
    # BUILDKIT_OPERATOR_HTTP_PROXY + BUILDKIT_OPERATOR_TUNNEL=1 itself).
    - |
      if [ -n "${BUILDKIT_OPERATOR_HTTP_PROXY:-}" ]; then
        export http_proxy="http://${BUILDKIT_OPERATOR_HTTP_PROXY}" https_proxy="http://${BUILDKIT_OPERATOR_HTTP_PROXY}" HTTP_PROXY="http://${BUILDKIT_OPERATOR_HTTP_PROXY}" HTTPS_PROXY="http://${BUILDKIT_OPERATOR_HTTP_PROXY}"
        export no_proxy="127.0.0.1,localhost" NO_PROXY="127.0.0.1,localhost"
      fi
    # Single source of truth: the same build script the GitHub Action runs.
    - curl -fsSL "https://raw.githubusercontent.com/SocialGouv/buildkit-operator/${BKO_REF}/scripts/build.sh" -o /tmp/bko-build.sh
    # Integrity gate: when BKO_SCRIPT_SHA256 is pinned, verify the fetched script before running it (a
    # mutated tag or a MITM on the GitHub raw fetch would otherwise execute attacker code on the runner).
    - |
      if [ -n "${BKO_SCRIPT_SHA256:-}" ]; then
        echo "${BKO_SCRIPT_SHA256}  /tmp/bko-build.sh" | sha256sum -c - \
          || { echo "buildkit-operator: build.sh sha256 mismatch — refusing to run (expected ${BKO_SCRIPT_SHA256})" >&2; exit 1; }
      else
        echo "buildkit-operator: WARNING build.sh fetched by ref without sha256 pin — set input script_sha256 to verify integrity" >&2
      fi
    - sh /tmp/bko-build.sh
    # Optional keyless signature of each pushed tag (image must be pushed).
    - |
      if [ "$BKO_SIGN" = "true" ] && [ "$PUSH" = "true" ]; then
        command -v cosign >/dev/null || apk add --no-cache cosign
        for t in $TAGS; do echo "cosign sign $t"; cosign sign --yes "$t"; done
      fi
