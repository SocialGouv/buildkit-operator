# https://taskfile.dev — task runner for buildkit-operator (control plane over vanilla buildkit).
# Run inside the devbox env: `devbox run -- task <name>` (or `task <name>` in a devbox/direnv shell).
# `task --list` shows the documented tasks.
version: "3"

vars:
  MODULE: github.com/socialgouv/buildkit-operator
  # controller-gen & golangci-lint are pinned here (single source of truth), run via `go run` so no
  # separate install is needed. Renovate keeps the versions current (see annotations below).
  # renovate: datasource=go depName=sigs.k8s.io/controller-tools
  CONTROLLER_GEN: go run sigs.k8s.io/controller-tools/cmd/controller-gen@v0.21.0
  # renovate: datasource=go depName=github.com/golangci/golangci-lint/v2
  GOLANGCI_LINT: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
  # Image refs for the local docker-build targets; override on the CLI, e.g.
  # `task docker-build IMG_BUILDD=ghcr.io/...:test`.
  IMG_BUILDD: ghcr.io/socialgouv/buildkit-operator-buildd:dev
  IMG_COMPANION: ghcr.io/socialgouv/buildkit-operator-companion:dev

tasks:
  default:
    desc: generate + manifests + build
    cmds:
      - task: generate
      - task: manifests
      - task: build

  generate:
    desc: deepcopy (zz_generated.deepcopy.go) for the API types
    cmds:
      - '{{.CONTROLLER_GEN}} object paths="./api/..."'

  manifests:
    desc: CRDs + RBAC from the +kubebuilder markers (commit the result)
    cmds:
      - |
        {{.CONTROLLER_GEN}} crd rbac:roleName=buildkit-operator-buildd \
          paths="./api/...;./internal/..." \
          output:crd:artifacts:config=deploy/crd \
          output:rbac:artifacts:config=deploy/rbac
      # helm installs CRDs from the chart crds/ dir
      - cp deploy/crd/buildkit-operator.socialgouv.github.io_*.yaml deploy/helm/buildkit-operator/crds/

  build:
    desc: compile all binaries into bin/
    cmds:
      - go build -o bin/buildd     ./cmd/buildd
      - go build -o bin/companion  ./cmd/companion
      - go build -o bin/build      ./cmd/build

  test:
    desc: unit tests
    cmds:
      - go test ./... -count=1

  lint:
    desc: golangci-lint (config .golangci.yml); same gate as CI
    cmds:
      - '{{.GOLANGCI_LINT}} run ./...'

  fmt:
    desc: gofmt
    cmds:
      - go fmt ./...

  vet:
    desc: go vet
    cmds:
      - go vet ./...

  tidy:
    desc: resolve module deps
    cmds:
      - go mod tidy

  docker-build:
    desc: build the buildd + companion images
    cmds:
      - docker build -t {{.IMG_BUILDD}}    -f cmd/buildd/Dockerfile     .
      - docker build -t {{.IMG_COMPANION}} -f cmd/companion/Dockerfile  .

  docker-push:
    desc: push the buildd + companion images
    cmds:
      - docker push {{.IMG_BUILDD}}
      - docker push {{.IMG_COMPANION}}

  install:
    desc: apply CRDs to the current kube context
    deps: [manifests]
    cmds:
      - kubectl apply -f deploy/crd

  uninstall:
    desc: delete CRDs from the current kube context
    cmds:
      - kubectl delete -f deploy/crd --ignore-not-found
