name: ci

# Gate the code on every PR and main push: build, vet, gofmt, race tests, lint. images.yml carries its
# own test job so tag builds are gated too (CI here does not run on tag pushes).
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - name: gofmt
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then echo "gofmt needed:"; echo "$unformatted"; exit 1; fi
      - run: go test -race ./... -count=1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      # Build golangci-lint with the runner's Go (from go.mod, 1.26) rather than a prebuilt binary:
      # the published v2.5.0 binary is built with go1.25 and refuses a go.mod targeting a newer Go.
      - run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0 run ./...
