name: images

# Build + push the buildd, companion and gateway images to this repo's GitHub Container Registry.
# Uses the Actions GITHUB_TOKEN (packages: write), so no personal token / scope is needed.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore: # docs / Action / scripts / release tooling don't change the binaries
      - "**.md"
      - "docs/**"
      - "mkdocs.yml"
      - "action.yml"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".release-it.json"
      - ".github/workflows/pages.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [buildd, companion, gateway]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/buildkit-operator-${{ matrix.component }}
          tags: |
            type=raw,value=dev,enable={{is_default_branch}}
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: cmd/${{ matrix.component }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Supply-chain attestations: SLSA provenance + SBOM, attached to the pushed image so
          # consumers can verify how/from-what it was built (docker buildx imagetools inspect / cosign).
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
