name: release

# Cut a versioned release with release-it: bump the chart version, changelog, git tag (v*), GitHub
# release, and publish the Helm chart as an OCI artifact to ghcr.io/socialgouv/charts. The v* tag
# then triggers images.yml, which tags the container images with the same semver.
on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Release the version in package.json as-is (none), or bump it first"
        default: none
        type: choice
        options: [none, patch, minor, major]

permissions:
  contents: write # tag + GitHub release
  packages: write # push the OCI chart

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --no-audit --no-fund # ci (not install) keeps the working dir clean for release-it
      - uses: azure/setup-helm@v4
      - run: helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - run: |
          if [ "${{ inputs.increment }}" = "none" ]; then
            npx release-it --no-increment --ci
          else
            npx release-it "${{ inputs.increment }}" --ci
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # release-it handles the version/tag/changelog/chart-push; the GitHub Release is created here via
      # the gh CLI (release-it's own octokit release call is flaky on v17 — "reading 'debug'" crash).
      - run: gh release create "$(git describe --tags --abbrev=0)" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
