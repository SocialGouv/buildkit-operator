name: release

# Cut a versioned release with release-it: bump the chart version, changelog, git tag (v*), GitHub
# release, and publish the Helm chart as an OCI artifact to ghcr.io/socialgouv/charts. The v* tag
# then triggers images.yml, which tags the container images with the same semver.
on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Release the version in package.json as-is (none), or bump it first"
        default: none
        type: choice
        options: [none, patch, minor, major]

permissions:
  contents: write # tag + GitHub release
  packages: write # push the OCI chart
  actions: write # dispatch images.yml for the new tag

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "lts/*"
      # pnpm is provisioned by Corepack, pinned via the package.json "packageManager" field.
      - run: corepack enable
      - run: pnpm install --frozen-lockfile # frozen lockfile keeps the working dir clean for release-it
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - run: helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - run: |
          if [ "${{ inputs.increment }}" = "none" ]; then
            pnpm exec release-it --no-increment --ci
          else
            pnpm exec release-it "${{ inputs.increment }}" --ci
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # release-it handles the version/tag/changelog/chart-push; the GitHub Release is created here via
      # the gh CLI (release-it's own octokit release call is flaky on v17 — "reading 'debug'" crash).
      - run: gh release create "$(git describe --tags --abbrev=0)" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # The v* tag is pushed with GITHUB_TOKEN, which by design does NOT trigger images.yml (GitHub
      # anti-recursion), so build the matching semver images explicitly. (gh workflow run via
      # GITHUB_TOKEN also won't trigger a run — a real token is needed, so dispatch it from the API.)
      - run: gh workflow run images.yml --ref "$(git describe --tags --abbrev=0)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true # if the token can't dispatch, run it manually: gh workflow run images.yml --ref vX.Y.Z
