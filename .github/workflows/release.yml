name: release

# Cut a versioned release with release-it: bump the chart version, changelog, git tag (v*), GitHub
# release, and publish the Helm chart as an OCI artifact to ghcr.io/socialgouv/charts. The v* tag
# then triggers images.yml, which tags the container images with the same semver.
on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Semver increment"
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write # tag + GitHub release
  packages: write # push the OCI chart

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - uses: azure/setup-helm@v4
      - run: helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - run: npx release-it ${{ inputs.increment }} --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
