site_name: buildkit-operator
site_description: A distributed BuildKit build service — one hot vanilla buildkitd per (project, arch) on Kubernetes.
site_url: https://socialgouv.github.io/buildkit-operator/
repo_url: https://github.com/socialgouv/buildkit-operator
docs_dir: docs

# The site Home is the root README (the rich overview), rendered to docs/index.md at build time by
# pages.yml (a sed that rewrites its docs/ links to the site root). docs/index.md is gitignored. The
# thin docs/README.md index is kept for GitHub folder browsing but excluded from the site below.
exclude_docs: |
  /README.md

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: indigo
      toggle: { icon: material/weather-night, name: Switch to dark }
    - scheme: slate
      primary: indigo
      toggle: { icon: material/weather-sunny, name: Switch to light }
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Architecture: architecture.md
  - CI integration: ci-integration.md
  - Onboarding: onboarding.md
  - Storage & cold cache: storage-and-cold-cache.md
  - Security: security.md
  - Sandboxed builds (Kata): sandboxed-builds.md
  - Platform notes (OVH MKS): platform-ovh-mks.md
  - Performance: performance.md
  - Comparison vs buildkit-service: comparison-buildkit-service.md
  - Build-acceleration landscape: build-acceleration-landscape.md
  - Benchmarks (Phase 0): benchmarks-phase0.md
  - Operations: operations.md
  - Lessons learned: lessons-learned.md
  - Decision records (ADR):
      - Overview: adr/README.md
      - 0001 Control plane over vanilla BuildKit: adr/0001-control-plane-over-vanilla-buildkit.md
      - 0002 Reject distributed snapshotter: adr/0002-reject-distributed-snapshotter.md
      - 0003 Scale-to-zero + retained PVC: adr/0003-scale-to-zero-retained-pvc.md
      - 0004 Shared SNI gateway: adr/0004-shared-sni-gateway.md
      - 0005 Kata for untrusted forks: adr/0005-kata-clh-for-untrusted-forks.md
      - 0006 Namespace topology: adr/0006-namespace-topology.md
